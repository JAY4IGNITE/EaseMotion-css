<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Flip Image Emphasis</h2>

<img
  src="https://picsum.photos/400/250"
  class="flip-image-emphasis"
  alt="Demo"
/>

<p style="margin: 2rem auto; max-width: 600px; text-align: center; color: #64748b; font-size: 0.875rem;">
  ♿ Accessibility: All flip animations are disabled when <strong>Reduce Motion</strong> is enabled in your OS settings.
  On macOS: System Settings → Accessibility → Display → Reduce Motion.
  On Windows: Settings → Accessibility → Visual Effects → Animation Effects (off).
</p>

</body>
</html>
